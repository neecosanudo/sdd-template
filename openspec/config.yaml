schema: spec-driven

context: |
  Tech stack: documentation/markdown-based template
  Architecture: template with governance, standards, patterns, specs
  Testing: SDD strategy defined but no test runner detected (template)
  Style: governed by ENGINEERING_MANIFEST.md and STYLE_GUIDE.md

strict_tdd: true

testing:
  # Testing Capabilities
  strict_tdd_mode: enabled
  detected: Mon Apr 27 2026

  # Test Runner
  test_runner:
    command: Not found
    framework: None

  # Test Layers
  test_layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null

  # Coverage
  coverage:
    available: false
    command: null
    threshold: 100  # per-package (enforced via decision log exclusions)

  # Quality Tools
  quality_tools:
    linter:
      available: false
      command: null
    type_checker:
      available: false
      command: null
    formatter:
      available: false
      command: null

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)