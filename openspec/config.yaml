schema: spec-driven

strict_tdd: true

default_mode:
  persistence: engram
  flow: auto
  execution: synchronous

rules:
  proposal:
    - Include rollback plan
  verify:
    - If fail, retake from Tasks
    - If fail, retry loop automatically (max 3 attempts)
    - After pass, switch to interactive before Archive
  tdd:
    - Tests must contain assertions
    - Detect and reject tests without assert/expect/reject
  archive:
    - Auto-commit all changes with Conventional Commits
    - Verify git status is clean after commit
    - Generate final project status report